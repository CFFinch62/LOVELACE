<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background - dark candlelit -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1205"/>
      <stop offset="60%" stop-color="#0f0b03"/>
      <stop offset="100%" stop-color="#080602"/>
    </radialGradient>

    <!-- Candlelight glow from above -->
    <radialGradient id="candleGlow" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ff9922" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Parchment paper gradient - aged, uneven -->
    <radialGradient id="parchGrad" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#e8d8a0"/>
      <stop offset="40%" stop-color="#d4c080"/>
      <stop offset="75%" stop-color="#c4a860"/>
      <stop offset="100%" stop-color="#b09040"/>
    </radialGradient>

    <!-- Paper edge shadow -->
    <linearGradient id="edgeShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.4"/>
      <stop offset="8%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="92%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Top/bottom edge shadow -->
    <linearGradient id="topShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="10%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="90%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Wax seal gradient - deep crimson -->
    <radialGradient id="sealGrad" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#cc3322"/>
      <stop offset="50%" stop-color="#8a1a10"/>
      <stop offset="100%" stop-color="#4a0a08"/>
    </radialGradient>

    <!-- L glow on seal -->
    <radialGradient id="lGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe0c0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cc4422" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold ink gradient -->
    <linearGradient id="goldInk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8960a"/>
      <stop offset="50%" stop-color="#a07808"/>
      <stop offset="100%" stop-color="#7a5a04"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="paperTexture" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4"
                    result="noise" seed="2"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComponentTransfer in="textured">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <filter id="sealGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="lGlowFilter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="inkGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="docShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sealShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feOffset dx="2" dy="3" in="blur" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="40"/>
  <!-- Candlelight atmosphere -->
  <rect width="400" height="400" fill="url(#candleGlow)" rx="40"/>

  <!-- Document drop shadow -->
  <rect x="58" y="36" width="290" height="330" rx="3"
        fill="#000000" opacity="0.5" filter="url(#docShadow)"
        transform="translate(4,4)"/>

  <!-- ============================================================ -->
  <!-- PARCHMENT DOCUMENT                                           -->
  <!-- ============================================================ -->
  <rect x="56" y="34" width="290" height="332" rx="3"
        fill="url(#parchGrad)"/>

  <!-- Paper texture overlay -->
  <rect x="56" y="34" width="290" height="332" rx="3"
        fill="url(#parchGrad)" filter="url(#paperTexture)" opacity="0.15"/>

  <!-- Edge shadows for depth -->
  <rect x="56" y="34" width="290" height="332" rx="3"
        fill="url(#edgeShadow)"/>
  <rect x="56" y="34" width="290" height="332" rx="3"
        fill="url(#topShadow)"/>

  <!-- Aged stain patches - subtle discolouration -->
  <ellipse cx="280" cy="80" rx="40" ry="25"
           fill="#b09040" opacity="0.15"/>
  <ellipse cx="90" cy="300" rx="30" ry="20"
           fill="#a08030" opacity="0.12"/>
  <ellipse cx="200" cy="190" rx="60" ry="40"
           fill="#c8a050" opacity="0.08"/>

  <!-- ============================================================ -->
  <!-- DECORATIVE BORDER - Victorian ornamental frame               -->
  <!-- ============================================================ -->
  <!-- Outer border -->
  <rect x="64" y="42" width="274" height="316" rx="2"
        fill="none" stroke="#8a6820" stroke-width="1.5" opacity="0.6"/>
  <!-- Inner border -->
  <rect x="68" y="46" width="266" height="308" rx="1"
        fill="none" stroke="#a07828" stroke-width="0.7" opacity="0.4"/>

  <!-- Corner ornaments - Victorian flourish style -->
  <g fill="none" stroke="#8a6820" stroke-width="1" opacity="0.55"
     filter="url(#inkGlow)">
    <!-- Top-left flourish -->
    <path d="M 64 60 Q 72 52 80 60 Q 72 68 64 60"/>
    <path d="M 64 54 L 78 54"/>
    <path d="M 70 48 L 70 62"/>
    <!-- Top-right flourish -->
    <path d="M 338 60 Q 330 52 322 60 Q 330 68 338 60"/>
    <path d="M 324 54 L 338 54"/>
    <path d="M 332 48 L 332 62"/>
    <!-- Bottom-left flourish -->
    <path d="M 64 342 Q 72 350 80 342 Q 72 334 64 342"/>
    <path d="M 64 348 L 78 348"/>
    <path d="M 70 340 L 70 354"/>
    <!-- Bottom-right flourish -->
    <path d="M 338 342 Q 330 350 322 342 Q 330 334 338 342"/>
    <path d="M 324 348 L 338 348"/>
    <path d="M 332 340 L 332 354"/>
  </g>

  <!-- ============================================================ -->
  <!-- HEADER - Title and attribution                               -->
  <!-- ============================================================ -->

  <!-- Decorative top rule -->
  <line x1="76" y1="62" x2="326" y2="62"
        stroke="#8a6820" stroke-width="1.2" opacity="0.6"/>
  <line x1="82" y1="65" x2="320" y2="65"
        stroke="#a07828" stroke-width="0.5" opacity="0.4"/>

  <!-- Main title - ornate, centered -->
  <text x="201" y="84"
        font-family="Georgia, serif"
        font-size="13"
        font-weight="bold"
        font-style="italic"
        text-anchor="middle"
        letter-spacing="3"
        fill="url(#goldInk)"
        filter="url(#goldGlow)">NOTE  G</text>

  <!-- Subtitle -->
  <text x="201" y="97"
        font-family="Georgia, serif"
        font-size="8"
        font-style="italic"
        text-anchor="middle"
        letter-spacing="1"
        fill="#6a4a10" opacity="0.85">On the Analytical Engine's Capacity</text>

  <!-- Author line -->
  <text x="201" y="109"
        font-family="Georgia, serif"
        font-size="8"
        font-style="italic"
        text-anchor="middle"
        fill="#7a5818" opacity="0.7">A.A. King,  Countess of Lovelace  —  1843</text>

  <!-- Decorative rule below header -->
  <line x1="82" y1="115" x2="320" y2="115"
        stroke="#8a6820" stroke-width="0.8" opacity="0.5"/>
  <!-- Small ornament center of rule -->
  <text x="201" y="119" font-family="serif" font-size="10"
        text-anchor="middle" fill="#8a6820" opacity="0.5">✦</text>
  <line x1="82" y1="120" x2="320" y2="120"
        stroke="#8a6820" stroke-width="0.5" opacity="0.3"/>

  <!-- ============================================================ -->
  <!-- MANUSCRIPT CONTENT - Ada syntax as algorithmic notation      -->
  <!-- ============================================================ -->

  <!-- Handwritten-style prose intro - italic serif -->
  <text x="76" y="136"
        font-family="Georgia, serif" font-size="8" font-style="italic"
        fill="#3a2808" opacity="0.75">The Engine may be so arranged as to effect</text>
  <text x="76" y="148"
        font-family="Georgia, serif" font-size="8" font-style="italic"
        fill="#3a2808" opacity="0.72">the computation of Bernoulli's Numbers...</text>

  <!-- Ada code section 1 - package declaration -->
  <text x="76" y="164"
        font-family="monospace" font-size="8"
        fill="#2a1a04" opacity="0.8" filter="url(#inkGlow)">-- Computation of Bernoulli Numbers</text>
  <text x="76" y="176"
        font-family="monospace" font-size="8"
        fill="#2a1a04" opacity="0.85">procedure Bernoulli is</text>
  <text x="84" y="188"
        font-family="monospace" font-size="8"
        fill="#3a2808" opacity="0.8">  B : array (0..8) of Float;</text>
  <text x="84" y="200"
        font-family="monospace" font-size="8"
        fill="#3a2808" opacity="0.8">  N : Integer := 0;</text>

  <!-- Small margin annotation -->
  <text x="300" y="182"
        font-family="Georgia, serif" font-size="7" font-style="italic"
        fill="#7a5010" opacity="0.55" text-anchor="middle">var. I</text>
  <line x1="284" y1="183" x2="296" y2="183"
        stroke="#8a6010" stroke-width="0.5" opacity="0.4"/>

  <!-- Ada code section 2 - begin block -->
  <text x="76" y="214"
        font-family="monospace" font-size="8"
        fill="#2a1a04" opacity="0.85">begin</text>
  <text x="84" y="226"
        font-family="monospace" font-size="8"
        fill="#3a2808" opacity="0.8">  B(0) := 1.0;</text>
  <text x="84" y="238"
        font-family="monospace" font-size="8"
        fill="#3a2808" opacity="0.8">  for N in 1..8 loop</text>
  <text x="92" y="250"
        font-family="monospace" font-size="8"
        fill="#4a3410" opacity="0.75">    B(N) := compute(N);</text>
  <text x="84" y="262"
        font-family="monospace" font-size="8"
        fill="#3a2808" opacity="0.8">  end loop;</text>

  <!-- Margin brace annotation -->
  <path d="M 308 224 Q 316 224 316 232 Q 316 250 316 258 Q 316 266 308 266"
        fill="none" stroke="#8a6010" stroke-width="0.8" opacity="0.45"/>
  <text x="320" y="248"
        font-family="Georgia, serif" font-size="6" font-style="italic"
        fill="#7a5010" opacity="0.55" text-anchor="start">iter.</text>

  <!-- Handwritten annotation between sections -->
  <text x="76" y="275"
        font-family="Georgia, serif" font-size="7" font-style="italic"
        fill="#5a3a0a" opacity="0.6">† vide the diagram of operations...</text>

  <!-- Ada code section 3 - pragma and end -->
  <text x="84" y="289"
        font-family="monospace" font-size="8"
        fill="#3a2808" opacity="0.8">  pragma Assert(B(2) = 1.0/6.0);</text>
  <text x="76" y="301"
        font-family="monospace" font-size="8"
        fill="#2a1a04" opacity="0.85">end Bernoulli;</text>

  <!-- Small mathematical diagram - a simple operations table -->
  <g opacity="0.45" stroke="#5a3a08" stroke-width="0.6" fill="none">
    <rect x="240" y="272" width="68" height="38" rx="1"/>
    <line x1="240" y1="282" x2="308" y2="282"/>
    <line x1="267" y1="272" x2="267" y2="310"/>
    <text x="250" y="280" font-family="monospace" font-size="6"
          fill="#5a3a08">Op.</text>
    <text x="278" y="280" font-family="monospace" font-size="6"
          fill="#5a3a08">Result</text>
    <text x="244" y="291" font-family="monospace" font-size="6"
          fill="#5a3a08">×  B₀</text>
    <text x="270" y="291" font-family="monospace" font-size="6"
          fill="#5a3a08">1.000</text>
    <text x="244" y="300" font-family="monospace" font-size="6"
          fill="#5a3a08">÷  N</text>
    <text x="270" y="300" font-family="monospace" font-size="6"
          fill="#5a3a08">0.166</text>
    <text x="244" y="309" font-family="monospace" font-size="6"
          fill="#5a3a08">+  B₂</text>
    <text x="270" y="309" font-family="monospace" font-size="6"
          fill="#5a3a08">0.333</text>
  </g>

  <!-- Decorative rule above footer -->
  <line x1="82" y1="316" x2="320" y2="316"
        stroke="#8a6820" stroke-width="0.8" opacity="0.5"/>
  <text x="201" y="320" font-family="serif" font-size="8"
        text-anchor="middle" fill="#8a6820" opacity="0.4">✦</text>
  <line x1="82" y1="322" x2="320" y2="322"
        stroke="#8a6820" stroke-width="0.5" opacity="0.3"/>

  <!-- Footer text -->
  <text x="80" y="338"
        font-family="Georgia, serif" font-size="7" font-style="italic"
        fill="#6a4810" opacity="0.6">Translated for the Analytical Engine  ·  London</text>

  <!-- ============================================================ -->
  <!-- WAX SEAL - bottom right, L as the Countess's mark           -->
  <!-- ============================================================ -->

  <!-- Seal shadow on parchment -->
  <circle cx="298" cy="338" r="26"
          fill="#8a5010" opacity="0.2" filter="url(#sealGlow)"/>

  <!-- Wax seal body - slightly irregular for realism -->
  <circle cx="296" cy="336" r="24"
          fill="url(#sealGrad)" filter="url(#sealShadow)"/>

  <!-- Seal edge - pressed wax rim detail -->
  <circle cx="296" cy="336" r="24"
          fill="none" stroke="#cc4422" stroke-width="2" opacity="0.4"/>
  <circle cx="296" cy="336" r="21"
          fill="none" stroke="#aa2a18" stroke-width="1" opacity="0.5"/>

  <!-- Seal ring text - circular "LOVELACE" around edge -->
  <!-- Approximated with arc-positioned characters -->
  <g font-family="Georgia, serif" font-size="5.5" font-weight="bold"
     fill="#e8a080" opacity="0.75" letter-spacing="1">
    <text x="296" y="316" text-anchor="middle">· L O V E L A C E ·</text>
  </g>

  <!-- Inner seal circle -->
  <circle cx="296" cy="338" r="15"
          fill="none" stroke="#aa2a18" stroke-width="0.8" opacity="0.5"/>

  <!-- L - glowing on the seal -->
  <text x="296" y="346"
        font-family="Georgia, serif"
        font-size="22"
        font-weight="bold"
        font-style="italic"
        text-anchor="middle"
        fill="#cc3311"
        filter="url(#lGlowFilter)"
        opacity="0.4">L</text>
  <text x="296" y="346"
        font-family="Georgia, serif"
        font-size="22"
        font-weight="bold"
        font-style="italic"
        text-anchor="middle"
        fill="#ffffff"
        filter="url(#lGlowFilter)">L</text>

  <!-- Seal ribbon/streamer underneath - Victorian detail -->
  <path d="M 276 358 Q 280 366 288 362 Q 296 370 304 362 Q 312 366 316 358"
        fill="none" stroke="#8a1a10" stroke-width="2" opacity="0.4"/>

</svg>
